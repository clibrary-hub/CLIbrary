tool: commit-fmt
type: readonly
generated: "2026-04-27"
skip: false

setup:
  files:
    - path: testdata/msg.txt
      content: "feat: add new feature\n"

cases:
  - id: help_works
    description: --help exits 0
    cmd: ["--help"]
    expect:
      exit_code: 0
      stdout_contains: "Usage:"
