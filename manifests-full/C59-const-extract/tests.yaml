tool: const-extract
type: readonly
generated: "2026-04-27"
skip: false

setup:
  files:
    - path: testdata/consts.py
      content: "x = \"magic_value\"\ny = \"magic_value\"\nz = \"magic_value\"\n"

cases:
  - id: help_works
    description: --help exits 0
    cmd: ["--help"]
    expect:
      exit_code: 0
      stdout_contains: "Usage:"
  - id: scan_produces_output
    description: scan runs and returns output
    cmd: ["scan", "testdata/consts.py"]
    expect:
      exit_code: 0
      stdout_contains: magic_value
