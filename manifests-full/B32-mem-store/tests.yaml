cases:
  - id: help_works
    description: --help exits 0
    cmd: ["--help"]
    expect:
      exit_code: 0
      stdout_contains: "Usage:"
  - id: write_data
    description: write/add entry
    cmd: ["add", "test_key_xyz", "test_value_xyz", "--category", "test"]
    expect:
      exit_code: 0
  - id: read_data
    description: read/list entry
    cmd: ["get", "test_key_xyz"]
    expect:
      exit_code: 0
